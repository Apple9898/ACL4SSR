; ========================
; 融合版：ACL4SSR + 自定义 AI/地区/业务分组 (Complete INI Edition)
; 基础来自：ACL4SSR_Online_Full_Mannix
; 优化内容：修复 TLS 错误源，增强 AI 规则，适配 2026 环境
; ========================

[custom]
; 不要随意改变关键字，否则会导致出错

; ================= TUN / 高级设置 =================
tun = true
stack = gvisor
device = utun
endpoint-independent-nat = true
auto-route = false
auto-detect-interface = false
strict-route = false
store-selected = true
store-fake-ip = true

sniffer = true
sniffer.override-destination = true
sniffer.force-domain = +.netflix.com, +.nflxvideo.net, +.amazonaws.com, +.media.dssott.com, +.openai.com, +.chatgpt.com
sniffer.skip-domain = +.apple.com, Mijia Cloud, dlg.io.mi.com, +.oray.com, +.sunlogin.net, +.push.apple.com, +.msftconnecttest.com, +.msftncsi.com

; ================= 规则集（ruleset） =================
; --- 基础直连/广告 (ACL4SSR 官方源) ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list

; --- 微软 / 苹果 / 常用服务 ---
ruleset=Ⓜ️ 微软Bing,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Bing.list
ruleset=Ⓜ️ 微软云盘,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; --- AI 类分组规则 (优化源：优先使用 metacubex 官方 GeoSite，个人库使用 JSdelivr 加速) ---
ruleset=💬 AI通用,https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/openai.mrs
ruleset=💬 AI通用,https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/groq.mrs
ruleset=💬 AI通用,https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/perplexity.mrs
; 使用 JSdelivr 加速个人维护的列表，防止 gh-proxy 失效导致 TLS 错误
ruleset=💬 Meta AI,https://fastly.jsdelivr.net/gh/liandu2024/clash@main/list/MetaAi.list
ruleset=💬 Grok,https://fastly.jsdelivr.net/gh/liandu2024/clash@main/list/Grok.list

; --- Crypto / 数字货币 ---
ruleset=💰 数字货币,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cryptocurrency/Cryptocurrency.list

; --- Nvidia ---
ruleset=🖥️ Nvidia,https://fastly.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Nvidia/Nvidia.list

; --- Reddit ---
ruleset=🧵 Reddit,https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/reddit.mrs

; --- 游戏 / 流媒体 (原版保留) ---
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Epic.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Origin.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Sony.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Nintendo.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list

; --- 国内/直连/IP规则 ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; ================= 分组定义（custom_proxy_group） =================

; --- 主选择组 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*

; --- 地区自动/手动/故转 ---
custom_proxy_group=🇭🇰 香港节点`select`.*香港.*|.*HK.*|.*广港.*
custom_proxy_group=🇭🇰 香港 - 自动`url-test`.*香港.*|.*HK.*|.*广港.*`http://www.gstatic.com/generate_204`300`50
custom_proxy_group=🇭🇰 香港 - 故转`fallback`🇭🇰 香港 - 自动`🇭🇰 香港节点`http://www.gstatic.com/generate_204`300

custom_proxy_group=🇨🇳 台湾节点`select`.*台湾.*|.*TW.*|.*台灣.*
custom_proxy_group=🇨🇳 台湾 - 自动`url-test`.*台湾.*|.*TW.*|.*台灣.*`http://www.gstatic.com/generate_204`300`50

custom_proxy_group=🇯🇵 日本节点`select`.*日本.*|.*JP.*|.*东京.*
custom_proxy_group=🇸🇬 狮城节点`select`.*新加坡.*|.*SG.*

custom_proxy_group=🇺🇲 美国节点`select`.*美国.*|.*US.*|.*洛杉矶.*|.*旧金山.*

; --- 业务分流组 (AI 重点优化) ---
; AI通用：OpenAI, Groq, Perplexity 等，可自动测速或手动指定
custom_proxy_group=💬 AI通用`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港 - 故转`[]🇨🇳 台湾 - 自动`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]DIRECT

; Meta AI: 往往对香港/美国节点友好
custom_proxy_group=💬 Meta AI`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港 - 故转`[]🇺🇲 美国节点`[]DIRECT

; Perplexity: 新加坡节点通常延迟较低
custom_proxy_group=💬 Perplexity`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]DIRECT

; Nvidia: 主要是下载驱动/更新，优选美国
custom_proxy_group=🖥️ Nvidia`select`[]🚀 节点选择`[]🇺🇲 美国节点`[]DIRECT

; 数字货币: 需要高稳定性，避免频繁跳 IP
custom_proxy_group=💰 数字货币`select`[]🚀 节点选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]DIRECT

; Reddit: 图片加载多，需要大带宽
custom_proxy_group=🧵 Reddit`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]DIRECT

; --- 原版常用分组 (保留) ---
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]DIRECT
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🎥 奈飞视频`select`[]🎥 奈飞专用`[]🚀 节点选择`[]🇺🇲 美国节点`[]DIRECT

; ================= 规则（rules）部分 =================
; 注意：在 INI 模式下，ruleset 会自动生成 rules，通常不需要手动写 rules
; 但如果需要微调顺序，可以在这里补充，一般保持为空即可让转换引擎自动处理
