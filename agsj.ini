; ================= 分组定义（custom_proxy_group） =================

; 主选择组（加入你需要的业务组）
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🇭🇰 香港节点`[]🇨🇳 台湾节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*

; 地区自动/手动/故转（参考你原配置）
custom_proxy_group=🇭🇰 香港节点`select`.*香港.*|.*HK.*|.*广港.*
custom_proxy_group=🇭🇰 香港-自动`url-test`.*香港.*|.*HK.*|.*广港.*`http://www.gstatic.com/generate_204`300`50
custom_proxy_group=🇭🇰 香港-故转`fallback`🇭🇰 香港-自动`🇭🇰 香港节点`http://www.gstatic.com/generate_204`300

custom_proxy_group=🇨🇳 台湾节点`select`.*台湾.*|.*TW.*|.*台灣.*
custom_proxy_group=🇨🇳 台湾-自动`url-test`.*台湾.*|.*TW.*|.*台灣.*`http://www.gstatic.com/generate_204`300`50

custom_proxy_group=🇯🇵 日本节点`select`.*日本.*|.*JP.*|.*东京.*
custom_proxy_group=🇸🇬 狮城节点`select`.*新加坡.*|.*SG.*

custom_proxy_group=🇺🇲 美国节点`select`.*美国.*|.*US.*|.*美国.*

; 业务分流组（你原有的重点分组）
custom_proxy_group=💬 AI通用`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港-故转`[]🇨🇳 台湾-自动`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=💬 Meta AI`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港-故转`[]DIRECT
custom_proxy_group=💬 Perplexity`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇸🇬 狮城节点`[]DIRECT
custom_proxy_group=🖥️ Nvidia`select`[]🚀 节点选择`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=💰 数字货币`select`[]🚀 节点选择`[]🇸🇬 狮城节点`[]🇭🇰 香港节点`[]DIRECT
custom_proxy_group=🧵 Reddit`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]DIRECT

; 原版常用分组（保留）
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]DIRECT
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇺🇲 美国节点`[]DIRECT
custom_proxy_group=🎥 奈飞视频`select`[]🎥 奈飞专用`[]🚀 节点选择`[]🇺🇲 美国节点`[]DIRECT

; ================= 规则（rules）部分示例 =================
; 注意：实际规则顺序很重要，以上 ruleset 会自动生成 rules
; 如果客户端支持，你可以在 [Rule] 里手动微调，但一般使用 ruleset 就够了
